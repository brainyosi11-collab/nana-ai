<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ココナ先生</title>

<style>
body{
font-family: Arial;
background:#fff7f9;
text-align:center;
padding:40px;
}

h1{
color:#ff6fa5;
}

.chatbox{
width:80%;
max-width:500px;
margin:auto;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px 20px;
background:#ff6fa5;
color:white;
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<h1>ココナ先生 🌸</h1>
<p>やさしいダイエットメンター</p>

<div class="chatbox">

<input id="message" placeholder="今日はどんな気分？">

<button onclick="send()">相談する</button>

<p id="reply"></p>

</div>

<script>

async function send(){

let msg = document.getElementById("message").value;

let response = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
});

let data = await response.json();

document.getElementById("reply").innerText =
"ココナ先生：" + data.reply;

}

</script>

</body>
</html>
